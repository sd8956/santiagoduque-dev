name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck, lint, format, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Asset size guard
        run: |
          set -euo pipefail
          MAX_KB=500
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            size_kb=$(( $(stat -c%s "$f") / 1024 ))
            if [ "$size_kb" -gt "$MAX_KB" ]; then
              echo "::error file=$f::Asset is ${size_kb}KB, exceeds ${MAX_KB}KB limit. Compress it, or gitignore it if it's build-generated."
              fail=1
            fi
          done < <(git ls-files public/ | grep -iE '\.(png|jpg|jpeg|webp|gif)$' || true)
          exit $fail

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
